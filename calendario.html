<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📅 Calendario Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    /* MANTENGO TUS ESTILOS INTACTOS */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink-bg: #ffd6e0; --pink-mid: #ffb3c6; --pink-dark: #ff85a1; --pink-accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25);
    }

    [data-theme="blue"] {
      --pink-bg: #d6eaff; --pink-mid: #b3d9ff; --pink-dark: #85bfff; --pink-accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.4s ease;
    }

    header { width: 100%; padding: 60px 25px 20px; display: flex; align-items: center; justify-content: space-between; }
    .back-btn { font-size: 24px; color: var(--pink-accent); text-decoration: none; font-weight: 900; }
    .current-month { font-size: 24px; font-weight: 900; color: var(--pink-accent); cursor: pointer; }

    .calendar-container {
      width: 92%; max-width: 400px; background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px); border-radius: 35px; padding: 20px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 15px; }
    .weekdays div { font-weight: 900; color: var(--pink-dark); font-size: 14px; text-transform: lowercase; }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .day {
      aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: white; border-radius: 18px; font-weight: 800; color: var(--pink-accent);
      position: relative; transition: 0.2s; font-size: 17px; cursor: pointer;
    }
    .day.today { background: var(--pink-accent); color: white; box-shadow: 0 5px 15px var(--shadow); }
    .day.other-month { opacity: 0.3; }

    /* ESTO ES LO ÚNICO NUEVO EN CSS: LA POSICIÓN DE LA MALETA */
    .trip-icon {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 10px;
    }

    .event-dot {
      position: absolute; bottom: 6px; font-size: 10px;
    }

    /* MANTENGO TU MODAL DE RUEDAS Y EVENTOS */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white; padding: 30px; border-radius: 35px; width: 100%; max-width: 350px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-content h2 { color: var(--pink-accent); margin-bottom: 20px; text-align: center; font-weight: 900; }
    
    .wheel-container { display: flex; justify-content: space-around; height: 150px; overflow: hidden; margin: 20px 0; }
    .wheel { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; -ms-overflow-style: none; scrollbar-width: none; }
    .wheel::-webkit-scrollbar { display: none; }
    .wheel-item { height: 50px; line-height: 50px; scroll-snap-align: center; font-weight: 800; color: #ccc; transition: 0.3s; cursor: pointer; }
    .wheel-item.selected { color: var(--pink-accent); font-size: 20px; }

    input, select {
      width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 2px solid var(--pink-bg);
      outline: none; font-family: inherit; font-weight: 700; background: #f9f9f9;
    }

    .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; margin-top: 10px; cursor: pointer; }
    .btn-save { background: var(--pink-accent); color: white; }
    .btn-cancel { background: #eee; color: #777; }

    .event-list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; background: #f9f9f9; border-radius: 10px; margin-bottom: 5px; font-weight: 700;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn">✕</a>
    <div class="current-month" id="monthDisplay" onclick="openPicker()">Mes Año</div>
    <div style="display: flex; gap: 15px;">
      <button class="back-btn" onclick="changeMonth(-1)">‹</button>
      <button class="back-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="calendar-container">
    <div class="weekdays">
      <div>lu</div><div>ma</div><div>mi</div><div>ju</div><div>vi</div><div>sá</div><div>do</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="modal" id="pickerModal">
    <div class="modal-content">
      <h2>Seleccionar Mes</h2>
      <div class="wheel-container">
        <div class="wheel" id="monthWheel"></div>
        <div class="wheel" id="yearWheel"></div>
      </div>
      <button class="btn btn-save" onclick="closePicker()">Aceptar</button>
    </div>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-content">
      <h2 id="modalTitle">Eventos</h2>
      <div id="eventList" style="margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></div>
      <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
      <input type="text" id="eventTitle" placeholder="Nuevo evento...">
      <select id="eventType">
        <option value="❤️">Aniversario ❤️</option>
        <option value="🎂">Cumpleaños 🎂</option>
        <option value="✨">Especial ✨</option>
      </select>
      <button class="btn btn-save" onclick="saveEvent()">Añadir</button>
      <button class="btn btn-cancel" onclick="closeModals()">Cerrar</button>
    </div>
  </div>

  <script src="global.js"></script>
  <script type="module">
    import { db, auth } from './firebase.js';
    import { collection, query, where, onSnapshot, addDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    let user, parejaId;
    let date = new Date();
    let eventos = [];
    let viajes = []; // <--- AGREGADO
    let selectedDayStr = "";

    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    onAuthStateChanged(auth, async (u) => {
      if (!u) window.location.href = "auth.html";
      user = u;
      const uDoc = await getDoc(doc(db, "usuarios", user.uid));
      parejaId = uDoc.data()?.parejaId;
      escucharEventosYViajes(); // <--- MODIFICADO
    });

    function escucharEventosYViajes() {
      const ids = [user.uid]; if(parejaId) ids.push(parejaId);

      // Escuchar Eventos (Original)
      onSnapshot(query(collection(db, "eventos_calendario"), where("creador", "in", ids)), (snap) => {
        eventos = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
        renderCalendar();
      });

      // Escuchar Viajes (Nuevo para la maleta)
      onSnapshot(query(collection(db, "viajes"), where("creadorPor", "in", ids)), (snap) => {
        viajes = snap.docs.map(d => d.data());
        renderCalendar();
      });
    }

    function renderCalendar() {
      const grid = document.getElementById('daysGrid');
      const monthDisp = document.getElementById('monthDisplay');
      grid.innerHTML = '';

      const year = date.getFullYear();
      const month = date.getMonth();
      monthDisp.textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      const startOffset = firstDay === 0 ? 6 : firstDay - 1;

      for(let i = 0; i < startOffset; i++) {
        const d = document.createElement('div');
        d.className = 'day other-month';
        grid.appendChild(d);
      }

      for(let i = 1; i <= lastDay; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.textContent = i;

        const fechaIso = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const actualTime = new Date(year, month, i).getTime();

        if(i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
          dayDiv.classList.add('today');
        }

        // --- LÓGICA DE LA MALETA ---
        const hayViaje = viajes.some(v => {
          const inicio = new Date(v.fechaInicio + "T00:00:00").getTime();
          const fin = new Date(v.fechaFin + "T23:59:59").getTime();
          return actualTime >= inicio && actualTime <= fin;
        });

        if (hayViaje) {
          const tripIcon = document.createElement('span');
          tripIcon.className = 'trip-icon';
          tripIcon.textContent = '🧳';
          dayDiv.appendChild(tripIcon);
        }

        // Eventos (Tus iconos de tarta/corazón)
        const evs = eventos.filter(e => e.fecha === fechaIso);
        if(evs.length > 0) {
          const dot = document.createElement('span');
          dot.className = 'event-dot';
          dot.textContent = evs[0].tipo;
          dayDiv.appendChild(dot);
        }

        dayDiv.onclick = () => openEventModal(fechaIso);
        grid.appendChild(dayDiv);
      }
    }

    // TUS FUNCIONES ORIGINALES (SIN CAMBIOS)
    window.openEventModal = (fechaStr) => {
      selectedDayStr = fechaStr;
      document.getElementById('modalTitle').textContent = fechaStr.split('-').reverse().join('/');
      const list = document.getElementById('eventList');
      list.innerHTML = '';
      
      const diaEvs = eventos.filter(e => e.fecha === fechaStr);
      if(diaEvs.length === 0) list.innerHTML = '<p style="text-align:center; color:#999;">Sin eventos</p>';
      
      diaEvs.forEach(e => {
        const item = document.createElement('div');
        item.className = 'event-list-item';
        item.innerHTML = `<span>${e.tipo} ${e.titulo}</span> <span onclick="deleteEvent('${e.firestoreId}')" style="color:#ff4d79; font-size:18px;">✕</span>`;
        list.appendChild(item);
      });

      document.getElementById('eventModal').classList.add('show');
    };

    window.saveEvent = async () => {
      const titulo = document.getElementById('eventTitle').value.trim();
      const tipo = document.getElementById('eventType').value;
      if(!titulo) return;
      await addDoc(collection(db, "eventos_calendario"), {
        fecha: selectedDayStr, titulo, tipo, creador: user.uid
      });
      document.getElementById('eventTitle').value = '';
    };

    window.deleteEvent = async (firestoreId) => {
      if(confirm("¿Quieres borrar este evento?")) {
        await deleteDoc(doc(db, "eventos_calendario", firestoreId));
        closeModals();
      }
    };

    window.closeModals = () => document.getElementById('eventModal').classList.remove('show');
    window.changeMonth = (delta) => { date.setMonth(date.getMonth() + delta); renderCalendar(); };

    window.openPicker = () => {
      const mWheel = document.getElementById('monthWheel');
      const yWheel = document.getElementById('yearWheel');
      mWheel.innerHTML = ''; yWheel.innerHTML = '';
      monthNames.forEach((m, i) => {
        const item = document.createElement('div');
        item.className = 'wheel-item' + (i === date.getMonth() ? ' selected' : '');
        item.textContent = m;
        item.onclick = () => { date.setMonth(i); openPicker(); renderCalendar(); };
        mWheel.appendChild(item);
      });
      for(let y = date.getFullYear() - 5; y <= date.getFullYear() + 5; y++) {
        const item = document.createElement('div');
        item.className = 'wheel-item' + (y === date.getFullYear() ? ' selected' : '');
        item.textContent = y;
        item.onclick = () => { date.setFullYear(y); openPicker(); renderCalendar(); };
        yWheel.appendChild(item);
      }
      document.getElementById('pickerModal').classList.add('show');
    };

    window.closePicker = () => document.getElementById('pickerModal').classList.remove('show');

  </script>
</body>
</html>
