<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; height: 100dvh; transition: background 0.4s ease; }
    .chat-header { padding: 50px 20px 15px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 10px var(--shadow); flex-shrink: 0; position: relative; }
    .back-btn { position: absolute; left: 18px; bottom: 12px; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.6); border-radius: 12px; padding: 6px 10px; color: var(--accent); font-weight: 900; box-shadow: 0 2px 8px var(--shadow); cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; }
    .menu-btn { position: absolute; right: 18px; bottom: 12px; background: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 20px; box-shadow: 0 2px 8px var(--shadow); cursor: pointer; border: none; z-index: 10; }
    .dropdown-menu { position: absolute; right: 20px; top: 95px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; z-index: 100; min-width: 150px; }
    .dropdown-menu.show { display: flex; }
    .menu-item { padding: 12px 20px; font-size: 14px; font-weight: 700; color: #ff4d4d; cursor: pointer; text-align: left; }
    .chat-header h2 { font-size: 18px; color: var(--accent); font-weight: 900; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; flex-shrink: 0; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; }
    .input-area { background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; padding: 12px 15px 60px; }
    input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--bg); outline: none; font-size: 16px; }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('theme') === 'blue') document.documentElement.setAttribute('data-theme', 'blue');</script>
  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2>Nuestro Chat 💕</h2>
  </div>
  <div id="chat-container"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe aquí..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-messaging.js";

    let user = null, parejaId = null;
    let primeraCarga = true;
    const container = document.getElementById('chat-container');
    const msgInput = document.getElementById('msgInput');
    const messaging = getMessaging();

    // 1. REGISTRAR SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log("Service Worker listo.");
      });
    }

    // 2. PEDIR PERMISOS Y GUARDAR TOKEN
    async function setupFCM(userId) {
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const token = await getToken(messaging, { vapidKey: 'BCAD1wd4akkmElcAqzk2sOVuMPGV5ntxBeo7rF4q3K7Ey_4hIMhLVVvriRcRGUo46L51Tk73F49-IpISwRs0nOk' });
          if (token) await setDoc(doc(db, "usuarios", userId), { fcmToken: token }, { merge: true });
        }
      } catch (err) { console.error("Error FCM:", err); }
    }

    // 3. LANZAR NOTIFICACIÓN LOCAL
    function lanzarNotificacion(texto) {
      if (Notification.permission === 'granted') {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification("Nuevo mensaje 💕", {
            body: texto,
            icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
            vibrate: [200, 100, 200],
            tag: 'chat-msg'
          });
        });
      }
    }

    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href = 'auth.html'; return; }
      user = u;
      setupFCM(u.uid);
      const userDoc = await getDoc(doc(db, "usuarios", u.uid));
      if (userDoc.exists() && userDoc.data().parejaId) {
        parejaId = userDoc.data().parejaId;
        cargarMensajes();
      }
    });

    function cargarMensajes() {
      const q = query(collection(db, "mensajes"), 
                where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]), 
                orderBy("timestamp", "asc"));
      
      onSnapshot(q, (snap) => {
        const cambios = snap.docChanges();
        
        if (!primeraCarga) {
          cambios.forEach(change => {
            if (change.type === "added") {
              const m = change.doc.data();
              if (m.senderId === parejaId) {
                lanzarNotificacion(m.text);
              }
            }
          });
        }

        container.innerHTML = '';
        snap.forEach(d => {
          const m = d.data();
          const div = document.createElement('div');
          div.className = `message-row ${m.senderId === user.uid ? 'me' : 'them'}`;
          div.innerHTML = `<img src="${m.senderPhoto || ''}" class="mini-avatar"><div class="bubble">${m.text}</div>`;
          container.appendChild(div);
        });
        container.scrollTo(0, container.scrollHeight);
        primeraCarga = false;
      });
    }

    document.getElementById('sendBtn').onclick = async () => {
      const text = msgInput.value.trim();
      if (!text || !parejaId) return;
      msgInput.value = '';
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId, text, senderId: user.uid,
        senderPhoto: user.photoURL, timestamp: serverTimestamp()
      });
    };
  </script>
</body>
</html>
