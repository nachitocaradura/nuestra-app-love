<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; box-shadow: 0 10px 25px var(--shadow); text-align: center; margin-top: 40px; }
    .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--mid); margin-bottom: 15px; }
    h2 { color: var(--accent); margin: 10px 0; }
    p { color: var(--dark); font-size: 14px; }
    .btn-back { margin-top: 30px; display: inline-block; text-decoration: none; background: var(--accent); color: white; padding: 12px 25px; border-radius: 20px; font-weight: bold; }
    .logout-btn { margin-top: 15px; background: none; border: 2px solid var(--dark); color: var(--dark); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div class="card">
    <img id="userPhoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
    <h2 id="userName">Cargando...</h2>
    <p id="userEmail">---</p>
    <button class="logout-btn" id="btnLogOut">Cerrar Sesión</button>
    <br>
    <a href="index.html" class="btn-back">Volver al Inicio</a>
  </div>

  <script>
    // Aplicar tema guardado
    if(localStorage.getItem('theme') === 'blue') document.documentElement.setAttribute('data-theme', 'blue');
  </script>

  <script type="module">
    import { auth } from './firebase.js';
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userEmail').textContent = user.email;
        if(user.photoURL) document.getElementById('userPhoto').src = user.photoURL;
      } else {
        window.location.href = "auth.html";
      }
    });

    document.getElementById('btnLogOut').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = "auth.html");
    });
  </script>
</body>
</html>
