<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📅 Calendario Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* TEMA ROSA (POR DEFECTO) */
    :root {
      --pink-bg: #ffd6e0; 
      --pink-mid: #ffb3c6; 
      --pink-dark: #ff85a1; 
      --pink-accent: #ff4d79; 
      --shadow: rgba(255, 77, 121, 0.25);
    }

    /* TEMA AZUL */
    [data-theme="blue"] {
      --pink-bg: #d6eaff; 
      --pink-mid: #b3d9ff; 
      --pink-dark: #85bfff; 
      --pink-accent: #4d94ff; 
      --shadow: rgba(77, 148, 255, 0.25);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.4s ease;
    }

    /* BOTÓN VOLVER */
    .back-btn {
      position: absolute;
      left: 18px;
      top: 55px;
      text-decoration: none;
      font-size: 20px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 6px 10px;
      color: var(--pink-accent);
      font-weight: 900;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    header {
      width: 100%;
      padding: 60px 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
    }

    header h1 {
      color: var(--pink-accent);
      font-weight: 900;
      font-size: 26px;
      cursor: pointer;
    }

    .nav-btn {
      background: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      color: var(--pink-accent);
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 4px 10px var(--shadow);
      cursor: pointer;
    }

    .calendar-container {
      width: 92%;
      max-width: 500px;
      background: white;
      border-radius: 35px;
      padding: 20px;
      box-shadow: 0 15px 35px var(--shadow);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      margin-bottom: 10px;
    }

    .weekdays div {
      color: var(--pink-dark);
      font-weight: 900;
      font-size: 13px;
      text-transform: uppercase;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      font-weight: 800;
      font-size: 16px;
      color: #555;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }

    .day:hover { background: var(--pink-bg); }

    .day.prev-date, .day.next-date { opacity: 0.3; }

    .day.today {
      background: var(--pink-accent);
      color: white;
      box-shadow: 0 5px 15px var(--shadow);
    }

    .event-dot {
      position: absolute;
      bottom: 6px;
      width: 6px;
      height: 6px;
      background: var(--pink-accent);
      border-radius: 50%;
    }
    .today .event-dot { background: white; }

    /* Estilo para emojis de viaje y recetas */
    .day-indicators {
      position: absolute;
      top: 4px;
      left: 4px;
      display: flex;
      gap: 1px;
      font-size: 10px;
      line-height: 1;
    }

    /* MODALES */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal.show { display: flex; }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      color: var(--pink-accent);
      margin-bottom: 15px;
      font-weight: 900;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 15px;
      border: 2px solid var(--pink-bg);
      font-family: inherit;
      outline: none;
      background: #fdfdfd;
    }

    .btn-save {
      background: var(--pink-accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 15px;
      width: 100%;
      font-weight: 900;
      margin-top: 10px;
      cursor: pointer;
    }

    .event-list {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .event-item {
      background: var(--pink-bg);
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    [data-theme="blue"] .event-item { background: #e6f2ff; }

    .event-item span { font-weight: 800; color: var(--pink-accent); }

    /* PICKER DE MES/AÑO */
    .wheel-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0;
    }
    .wheel {
      height: 150px;
      overflow-y: auto;
      width: 100px;
      text-align: center;
      border-radius: 15px;
      background: #f5f5f5;
    }
    .wheel-item {
      padding: 10px;
      font-weight: 900;
      color: #999;
      cursor: pointer;
    }
    .wheel-item.selected {
      color: var(--pink-accent);
      background: white;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">‹</a>

  <header>
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <h1 id="monthYear" onclick="openPicker()">Mes Año</h1>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </header>

  <div class="calendar-container">
    <div class="weekdays">
      <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
    </div>
    <div class="days" id="calendarDays"></div>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-content">
      <h2 id="selectedDateText">Fecha</h2>
      <div id="existingEvents" class="event-list"></div>
      <hr style="margin: 15px 0; border: 1px solid var(--pink-bg);">
      <input type="text" id="eventTitle" placeholder="Nuevo evento..." />
      <button class="btn-save" onclick="saveEvent()">Añadir Evento ✨</button>
      <button class="btn-save" style="background:#eee; color:#666;" onclick="closeModals()">Cerrar</button>
    </div>
  </div>

  <div class="modal" id="pickerModal">
    <div class="modal-content">
      <h2>Seleccionar Fecha</h2>
      <div class="wheel-container">
        <div class="wheel" id="monthWheel"></div>
        <div class="wheel" id="yearWheel"></div>
      </div>
      <button class="btn-save" onclick="closePicker()">Listo</button>
    </div>
  </div>

  <script src="global.js"></script>
  <script type="module">
    import { db, auth } from './firebase.js';
    import { collection, addDoc, query, where, onSnapshot, getDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const monthYearElement = document.getElementById('monthYear');
    const daysElement = document.getElementById('calendarDays');
    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    
    let date = new Date();
    let user, parejaId, selectedDateStr;
    let events = {};
    let viajesDias = {};
    let recetasDias = {};

    auth.onAuthStateChanged(async (u) => {
      if (!u) window.location.href = "auth.html";
      user = u;
      const uDoc = await getDoc(doc(db, "usuarios", u.uid));
      parejaId = uDoc.data()?.parejaId;
      initData();
    });

    function initData() {
      const ids = [user.uid];
      if (parejaId) ids.push(parejaId);

      // Listener Eventos
      onSnapshot(query(collection(db, "eventos_calendario"), where("creadorId", "in", ids)), (snap) => {
        events = {};
        snap.forEach(d => {
          const ev = d.data();
          if (!events[ev.fecha]) events[ev.fecha] = [];
          events[ev.fecha].push({ id: d.id, titulo: ev.titulo });
        });
        renderCalendar();
      });

      // Listener Viajes
      onSnapshot(query(collection(db, "viajes"), where("creadorPor", "in", ids)), (snap) => {
        viajesDias = {};
        snap.forEach(d => {
          const v = d.data();
          let start = new Date(v.fechaInicio + "T00:00:00");
          let end = new Date(v.fechaFin + "T00:00:00");
          for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate() + 1)) {
            viajesDias[dt.toISOString().split('T')[0]] = true;
          }
        });
        renderCalendar();
      });

      // LÓGICA AGREGADA: Listener Recetas Programadas
      onSnapshot(query(collection(db, "recetas"), where("creador", "in", ids)), (snap) => {
        recetasDias = {};
        snap.forEach(d => {
          const r = d.data();
          if(r.fechaCocinar) {
            recetasDias[r.fechaCocinar] = true;
          }
        });
        renderCalendar();
      });
    }

    function renderCalendar() {
      date.setDate(1);
      const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      const prevLastDay = new Date(date.getFullYear(), date.getMonth(), 0).getDate();
      const firstDayIndex = (new Date(date.getFullYear(), date.getMonth(), 1).getDay() + 6) % 7;
      const nextDays = 42 - (firstDayIndex + lastDay);

      monthYearElement.textContent = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
      let days = "";

      // Días mes anterior
      for (let x = firstDayIndex; x > 0; x--) {
        days += `<div class="day prev-date">${prevLastDay - x + 1}</div>`;
      }

      // Días mes actual
      for (let i = 1; i <= lastDay; i++) {
        const fullDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const isToday = i === new Date().getDate() && date.getMonth() === new Date().getMonth() && date.getFullYear() === new Date().getFullYear() ? "today" : "";
        const hasEvent = events[fullDate] ? `<div class="event-dot"></div>` : "";
        
        // Indicadores (Viajes + Recetas)
        let indicators = "";
        if (viajesDias[fullDate] || recetasDias[fullDate]) {
          indicators = `<div class="day-indicators">`;
          if (recetasDias[fullDate]) indicators += `<span>🍳</span>`;
          if (viajesDias[fullDate]) indicators += `<span>🧳</span>`;
          indicators += `</div>`;
        }

        days += `<div class="day ${isToday}" onclick="openDay('${fullDate}')">${indicators}${i}${hasEvent}</div>`;
      }

      // Días mes siguiente
      for (let j = 1; j <= nextDays; j++) {
        days += `<div class="day next-date">${j}</div>`;
      }
      daysElement.innerHTML = days;
    }

    window.openDay = (fecha) => {
      selectedDateStr = fecha;
      document.getElementById('selectedDateText').textContent = fecha.split('-').reverse().join('/');
      const list = document.getElementById('existingEvents');
      list.innerHTML = '';
      if (events[fecha]) {
        events[fecha].forEach(ev => {
          list.innerHTML += `<div class="event-item"><span>${ev.titulo}</span> <button onclick="deleteEvent('${ev.id}')" style="border:none; background:none; color:red; font-weight:900;">×</button></div>`;
        });
      }
      document.getElementById('eventModal').classList.add('show');
    };

    window.saveEvent = async () => {
      const title = document.getElementById('eventTitle').value;
      if (!title) return;
      await addDoc(collection(db, "eventos_calendario"), {
        titulo: title,
        fecha: selectedDateStr,
        creadorId: user.uid
      });
      document.getElementById('eventTitle').value = '';
      closeModals();
    };

    window.deleteEvent = async (firestoreId) => {
      if(confirm("¿Quieres borrar este evento?")) {
        await deleteDoc(doc(db, "eventos_calendario", firestoreId));
        closeModals();
      }
    };

    window.closeModals = () => document.getElementById('eventModal').classList.remove('show');
    window.changeMonth = (delta) => { date.setMonth(date.getMonth() + delta); renderCalendar(); };

    window.openPicker = () => {
      const mWheel = document.getElementById('monthWheel');
      const yWheel = document.getElementById('yearWheel');
      mWheel.innerHTML = ''; yWheel.innerHTML = '';
      monthNames.forEach((m, i) => {
        const item = document.createElement('div');
        item.className = 'wheel-item' + (i === date.getMonth() ? ' selected' : '');
        item.textContent = m;
        item.onclick = () => { date.setMonth(i); openPicker(); renderCalendar(); };
        mWheel.appendChild(item);
      });
      for(let y = date.getFullYear() - 5; y <= date.getFullYear() + 5; y++) {
        const item = document.createElement('div');
        item.className = 'wheel-item' + (y === date.getFullYear() ? ' selected' : '');
        item.textContent = y;
        item.onclick = () => { date.setFullYear(y); openPicker(); renderCalendar(); };
        yWheel.appendChild(item);
      }
      document.getElementById('pickerModal').classList.add('show');
    };

    window.closePicker = () => document.getElementById('pickerModal').classList.remove('show');
  </script>
</body>
</html>
