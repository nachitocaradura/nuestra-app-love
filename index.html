<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💕 Nuestra App</title>
  
  <link rel="manifest" href="manifest.json?v=2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icono-app-192.png?v=2">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink-bg: #ffd6e0;
      --pink-mid: #ffb3c6;
      --pink-dark: #ff85a1;
      --pink-accent: #ff4d79;
      --white: #fff;
      --shadow: rgba(255, 77, 121, 0.25);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Fondo decorativo */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; filter: blur(60px); z-index: 0; pointer-events: none;
    }
    body::before { width: 300px; height: 300px; background: radial-gradient(circle, #ffb3c6aa, transparent); top: -80px; right: -80px; }
    body::after { width: 250px; height: 250px; background: radial-gradient(circle, #ffc2d4aa, transparent); bottom: -60px; left: -60px; }

    /* Barra superior */
    .status-bar {
      position: relative; z-index: 1;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 22px 6px; font-size: 12px; font-weight: 700; color: var(--pink-accent);
    }

    /* Cabecera */
    .header {
      position: relative; z-index: 1; text-align: center; padding: 10px 20px 20px;
    }
    .header h1 { font-size: 26px; font-weight: 900; color: var(--pink-accent); letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: #ff85a1; margin-top: 2px; }

    /* Grid de Iconos */
    .grid {
      position: relative; z-index: 1; flex: 1;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      padding: 10px 24px; align-content: start;
    }

    .app-icon {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    .app-icon .icon-wrap {
      width: 68px; height: 68px; border-radius: 20px;
      background: linear-gradient(145deg, #fff0f5, #ffe0eb);
      box-shadow: 0 6px 20px var(--shadow), 0 2px 6px rgba(255,77,121,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; transition: transform 0.15s ease;
    }
    .app-icon:active .icon-wrap { transform: scale(0.91); }
    .app-icon span { font-size: 12px; font-weight: 700; color: #cc3366; text-align: center; }

    /* Corazones animados */
    .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .heart { position: absolute; font-size: 16px; opacity: 0; animation: floatUp 6s ease-in infinite; }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(0.8); }
      10% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-110vh) scale(1.1); }
    }

    .bottom-bar { position: relative; z-index: 1; height: 22px; display: flex; justify-content: center; margin-bottom: 8px; }
    .home-indicator { width: 120px; height: 5px; background: var(--pink-dark); border-radius: 99px; opacity: 0.5; }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="status-bar">
    <span id="clock">--:--</span>
    <span>💕</span>
  </div>

  <div class="header">
    <h1 id="welcomeText">Cargando...</h1>
    <p>Nuestro espacio favorito</p>
  </div>

  <div class="grid">
    <a class="app-icon" href="ruleta.html">
      <div class="icon-wrap">🎡</div>
      <span>Ruleta</span>
    </a>

    <a class="app-icon" href="calendario.html">
      <div class="icon-wrap">📅</div>
      <span>Calendario</span>
    </a>

    <a class="app-icon" href="perfil.html">
      <div class="icon-wrap">👤</div>
      <span>Perfil</span>
    </a>
  </div>

  <div class="bottom-bar">
    <div class="home-indicator"></div>
  </div>

  <script>
    // Reloj dinámico
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    updateClock();
    setInterval(updateClock, 10000);

    // Generador de corazones
    const heartsEl = document.getElementById('hearts');
    const emojis = ['💕','💗','💖','🌸','✨'];
    for (let i = 0; i < 12; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = (Math.random() * 100) + '%';
      h.style.bottom = '-30px';
      h.style.animationDelay = (Math.random() * 6) + 's';
      heartsEl.appendChild(h);
    }
  </script>

  <script type="module">
    import { auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "auth.html";
      } else {
        const nombre = user.displayName ? user.displayName.split(' ')[0] : "Amor";
        document.getElementById('welcomeText').textContent = "¡Hola, " + nombre + "! 💕";
      }
    });
  </script>
</body>
</html>
