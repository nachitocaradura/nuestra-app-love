<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.2);
    }
    [data-theme="blue"] {
      --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { 
      height: 100%; 
      overflow: hidden; 
      background: var(--bg);
    }

    body {
      font-family: 'Nunito', sans-serif;
      display: flex; 
      flex-direction: column;
      height: 100dvh; 
    }

    /* BARRA SUPERIOR CON BOTÓN DE RULETA */
    .chat-header {
      padding: 50px 20px 15px;
      background: white;
      display: flex; align-items: center; gap: 15px;
      box-shadow: 0 2px 10px var(--shadow);
      flex-shrink: 0;
    }
    
    .back-btn {
      width: 40px; height: 40px;
      background: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 4px 10px var(--shadow);
    }

    .chat-header h2 { font-size: 18px; color: var(--accent); flex: 1; font-weight: 900; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex; 
      flex-direction: column; 
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .message-row.them { align-self: flex-start; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; flex-shrink: 0; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
    }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* AJUSTE PARA TUS BOTONES DE ANDROID */
    .input-area {
      background: white;
      display: flex; 
      gap: 10px; 
      align-items: center;
      flex-shrink: 0;
      border-top: 1px solid #eee;
      padding: 15px 15px calc(25px + env(safe-area-inset-bottom)); /* Más margen abajo */
    }

    input {
      flex: 1; padding: 12px 18px; border-radius: 25px;
      border: 2px solid var(--bg); font-family: inherit; outline: none;
      font-size: 16px;
    }
    .send-btn {
      width: 45px; height: 45px; border-radius: 50%; background: var(--accent);
      border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center;
    }
    
    #statusDot { width:10px; height:10px; border-radius:50%; background:#ccc; }
  </style>
</head>
<body>

  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2 id="chatWith">Nuestro Chat 💕</h2>
    <div id="statusDot"></div>
  </div>

  <div id="chat-container"></div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Dile algo bonito..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    let user = null;
    let parejaId = null;
    const container = document.getElementById('chat-container');

    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href = 'auth.html'; return; }
      user = u;
      const userDoc = await getDoc(doc(db, "usuarios", u.uid));
      if (userDoc.exists() && userDoc.data().parejaId) {
        parejaId = userDoc.data().parejaId;
        document.getElementById('statusDot').style.background = '#4CAF50';
        cargarMensajes();
      }
    });

    function cargarMensajes() {
      const q = query(
        collection(db, "mensajes"),
        where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]),
        orderBy("timestamp", "asc")
      );

      onSnapshot(q, (snapshot) => {
        container.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const isMe = data.senderId === user.uid;
          const div = document.createElement('div');
          div.className = `message-row ${isMe ? 'me' : 'them'}`;
          div.innerHTML = `
            <img src="${data.senderPhoto || ''}" class="mini-avatar">
            <div class="bubble">${data.text}</div>
          `;
          container.appendChild(div);
        });
        container.scrollTo(0, container.scrollHeight);
      });
    }

    async function enviarMensaje() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !parejaId) return;
      input.value = '';
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId,
        text: text,
        senderId: user.uid,
        senderPhoto: user.photoURL,
        timestamp: serverTimestamp()
      });
    }

    document.getElementById('sendBtn').onclick = enviarMensaje;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };
  </script>
</body>
</html>
