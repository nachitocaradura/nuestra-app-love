<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💕 Nuestra App</title>
  
  <link rel="manifest" href="manifest.json?v=4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icono-app-192.png?v=4">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.2);
      --sidebar-bg: #fff; --text-main: #444;
    }

    [data-theme="blue"] {
      --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      transition: background 0.4s ease;
      overflow: hidden;
      position: relative;
    }

    /* --- ANIMACIÓN DE EMOTES --- */
    .heart-float {
      position: absolute; bottom: -50px; pointer-events: none; z-index: 1; opacity: 0;
      animation: floatUp 6s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* --- BARRA SUPERIOR --- */
    .top-system-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 50px 25px 10px;
      position: relative; z-index: 10;
    }
    .settings-trigger { font-size: 26px; color: var(--accent); cursor: pointer; }
    .profile-trigger {
      width: 42px; height: 42px; border-radius: 50%; border: 2px solid white;
      box-shadow: 0 4px 10px var(--shadow); overflow: hidden; cursor: pointer; background: white;
    }
    .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

    /* --- RELOJ Y BIENVENIDA --- */
    .hero-section {
      text-align: center;
      margin-top: 10px;
      position: relative;
      z-index: 5;
    }
    #main-clock {
      font-size: 60px;
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 10px var(--shadow);
      margin-bottom: -5px;
    }
    .header h1 { font-size: 24px; color: var(--accent); font-weight: 900; }

    /* --- GRID --- */
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      padding: 40px 25px; align-content: start; position: relative; z-index: 5;
    }
    .app-icon { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .icon-box {
      width: 72px; height: 72px; border-radius: 22px; background: white;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
      box-shadow: 0 8px 20px var(--shadow);
    }
    .app-icon span { font-size: 12px; font-weight: 800; color: var(--accent); }

    /* --- SIDEBAR --- */
    .sidebar {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: var(--sidebar-bg); z-index: 100;
      box-shadow: 10px 0 30px rgba(0,0,0,0.1);
      transition: left 0.3s ease; padding: 60px 20px;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      display: none; z-index: 99; backdrop-filter: blur(2px);
    }
    .sidebar-overlay.show { display: block; }
    .menu-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-radius: 12px; background: #f8f8f8;
      font-weight: 700; color: var(--text-main); cursor: pointer;
    }
    .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #fff; }
    .menu-content.open { max-height: 150px; padding: 15px; }
    .theme-bubble { display: flex; gap: 10px; }
    .dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
    .dot.active { border-color: #444; }
    .dot-pink { background: #ffb3c6; }
    .dot-blue { background: #b3d9ff; }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <h3 style="color:#888; font-size:12px; margin-bottom:20px;">SISTEMA</h3>
    <div class="menu-item">
      <div class="menu-header" onclick="toggleAccordion('acc-personalizar')">
        <span>Personalizar</span>
        <span>▾</span>
      </div>
      <div class="menu-content" id="acc-personalizar">
        <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Color del tema:</p>
        <div class="theme-bubble">
          <div class="dot dot-pink" id="dot-pink" onclick="setTheme('pink')"></div>
          <div class="dot dot-blue" id="dot-blue" onclick="setTheme('blue')"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="top-system-bar">
    <div class="settings-trigger" onclick="toggleSidebar()">☰</div>
    <div class="profile-trigger" onclick="window.location.href='perfil.html'">
      <img id="userPhoto" src="" alt="Perfil">
    </div>
  </div>

  <div class="hero-section">
    <div id="main-clock">00:00</div>
    <div class="header">
      <h1 id="welcomeText">Cargando... 💕</h1>
    </div>
  </div>

  <div class="grid">
    <a href="ruleta.html" class="app-icon">
      <div class="icon-box">🎡</div>
      <span>Ruleta</span>
    </a>
    <a href="calendario.html" class="app-icon">
      <div class="icon-box">📅</div>
      <span>Calendario</span>
    </a>
    <a href="chat.html" class="app-icon">
  <div class="icon-box">💬</div>
  <span>Chat</span>
</a>

  </div>

  <script>
    // --- RELOJ EN TIEMPO REAL ---
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('main-clock').textContent = `${hours}:${minutes}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- LLUVIA DE EMOTES ---
    function createEmote() {
      const emotes = ['💕','💗','💖','🌸','✨','❤️'];
      const e = document.createElement('div');
      e.className = 'heart-float';
      e.textContent = emotes[Math.floor(Math.random() * emotes.length)];
      e.style.left = Math.random() * 100 + 'vw';
      e.style.fontSize = (Math.random() * 20 + 15) + 'px';
      e.style.animationDuration = (Math.random() * 3 + 4) + 's';
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 6000);
    }
    setInterval(createEmote, 800);

    // --- SIDEBAR Y TEMAS ---
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
    function toggleAccordion(id) {
      document.getElementById(id).classList.toggle('open');
    }
    function setTheme(theme) {
      if(theme === 'blue') {
        document.documentElement.setAttribute('data-theme', 'blue');
        localStorage.setItem('theme', 'blue');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'pink');
      }
      updateDots();
    }
    function updateDots() {
      const t = localStorage.getItem('theme');
      document.getElementById('dot-pink').classList.toggle('active', t !== 'blue');
      document.getElementById('dot-blue').classList.toggle('active', t === 'blue');
    }

    if(localStorage.getItem('theme') === 'blue') setTheme('blue');
    updateDots();
  </script>

  <script type="module">
    import { auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "auth.html";
      } else {
        const nombre = user.displayName ? user.displayName.split(' ')[0] : "Amor";
        document.getElementById('welcomeText').textContent = "¡Hola, " + nombre + "! 💕";
        if(user.photoURL) document.getElementById('userPhoto').src = user.photoURL;
      }
    });
  </script>
</body>
</html>
