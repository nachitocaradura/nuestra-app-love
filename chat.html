<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25);
    }
    [data-theme="blue"] {
      --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; height: 100dvh; transition: background 0.4s ease; }
    .chat-header {
      padding: 50px 20px 15px; background: white; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; box-shadow: 0 2px 10px var(--shadow);
      flex-shrink: 0; position: relative;
    }
    .back-btn {
      position: absolute; left: 18px; bottom: 12px; text-decoration: none; font-size: 20px; 
      background: rgba(255,255,255,0.6); border-radius: 12px; padding: 6px 10px; 
      color: var(--accent); font-weight: 900; box-shadow: 0 2px 8px var(--shadow); 
      cursor: pointer; border: none; display: flex; align-items: center; justify-content: center;
    }
    .menu-btn {
      position: absolute; right: 18px; bottom: 12px; background: white; border-radius: 50%; 
      width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 20px; box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer; border: none; z-index: 10;
    }
    .dropdown-menu {
      position: absolute; right: 20px; top: 95px; background: white; border-radius: 15px; 
      box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; flex-direction: column; 
      overflow: hidden; z-index: 100; min-width: 150px;
    }
    .dropdown-menu.show { display: flex; }
    .menu-item { padding: 12px 20px; font-size: 14px; font-weight: 700; color: #ff4d4d; cursor: pointer; text-align: left; }
    .chat-header h2 { font-size: 18px; color: var(--accent); font-weight: 900; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    #typing-area { display: none; align-items: center; gap: 8px; margin-bottom: 10px; padding-left: 5px; }
    #typing-area.active { display: flex; }
    .typing-text { font-size: 13px; color: var(--dark); font-weight: 700; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; flex-shrink: 0; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; }
    .input-area { background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; padding: 12px 15px 60px; }
    input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--bg); outline: none; font-size: 16px; }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    #statusDot { position: absolute; top: 58px; right: 28%; width:8px; height:8px; border-radius:50%; background:#ccc; }

    /* NUEVOS ESTILOS PARA HORA Y FECHA */
    .message-content { display: flex; flex-direction: column; gap: 2px; }
    .msg-time { font-size: 10px; opacity: 0.7; margin-top: 2px; align-self: flex-end; font-weight: 700; }
    .me .msg-time { color: rgba(255, 255, 255, 0.9); }
    .them .msg-time { color: var(--dark); }
    .date-separator {
      text-align: center; margin: 20px 0; font-size: 11px; font-weight: 900; 
      color: var(--dark); text-transform: uppercase; letter-spacing: 1px; position: relative;
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('theme') === 'blue') document.documentElement.setAttribute('data-theme', 'blue');</script>

  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2>Nuestro Chat 💕</h2>
    <div id="statusDot"></div>
    <button class="menu-btn" onclick="toggleMenu()">⋮</button>
  </div>

  <div class="dropdown-menu" id="chatMenu">
    <div class="menu-item" onclick="vaciarChat()">🗑️ Vaciar chat</div>
  </div>

  <div id="chat-container"></div>

  <div id="typing-area">
    <img id="typing-img" src="" class="mini-avatar">
    <span class="typing-text"><span id="typing-name"></span> está escribiendo...</span>
  </div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe aquí..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    console.log("Script principal de chat.html cargado."); // Debug: Script cargado

    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, updateDoc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-messaging.js";

    let user = null, parejaId = null, typingTimeout = null;
    const container = document.getElementById('chat-container');
    const msgInput = document.getElementById('msgInput');
    const messaging = getMessaging();

    // Bloque de registro del Service Worker original comentado, Firebase Messaging lo registrará automáticamente

    async function activarNotificacionesFCM(userId) {
      try {
        console.log("Intentando activar notificaciones FCM para usuario:", userId); // Debug: Intentando activar FCM
        const token = await getToken(messaging, { 
          vapidKey: 'BCAD1wd4akkmElcAqzk2sOVuMPGV5ntxBeo7rF4q3K7Ey_4hIMhLVVvriRcRGUo46L51Tk73F49-IpISwRs0nOk' 
        });
        if (token) {
          console.log("FCM Token generado:", token); // Debug: Token generado
          await setDoc(doc(db, "usuarios", userId), { fcmToken: token }, { merge: true });
          console.log("FCM Token guardado en Firestore para el usuario:", userId); // Debug: Token guardado
        } else {
          console.log("No se pudo obtener el FCM Token (quizás permisos no concedidos o token inválido)"); // Debug: Token no obtenido
        }
      } catch (err) {
        console.error("Error en activarNotificacionesFCM:", err); // Debug: Error al activar FCM
      }
    }

    onAuthStateChanged(auth, async (u) => {
      console.log("onAuthStateChanged activado. Usuario:", u ? u.uid : "No autenticado"); // Debug: Estado de autenticación
      if (!u) {
        console.log("Usuario no autenticado, redirigiendo a auth.html"); // Debug: Redirección
        window.location.href = 'auth.html';
        return;
      }
      user = u;
      console.log("Usuario autenticado:", user.uid); // Debug: Usuario autenticado
      activarNotificacionesFCM(u.uid);
      
      const userDoc = await getDoc(doc(db, "usuarios", u.uid));
      console.log("Documento de usuario obtenido. Existe:", userDoc.exists()); // Debug: Documento de usuario

      if (userDoc.exists() && userDoc.data().parejaId) {
        parejaId = userDoc.data().parejaId;
        console.log("parejaId establecido a:", parejaId); // Debug: Pareja ID
        document.getElementById('statusDot').style.background = '#4CAF50';
        cargarMensajes();
        console.log("cargarMensajes() llamado."); // Debug: Cargar mensajes
        escucharEscribiendo();
        console.log("escucharEscribiendo() llamado."); // Debug: Escuchar escribiendo
      } else {
        console.log("Documento de usuario no existe o parejaId no definido/vacío."); // Debug: Sin pareja ID
        // Opcional: Podrías redirigir o mostrar un mensaje si no hay pareja configurada
        // window.location.href = 'perfil.html'; 
      }
    });

    function cargarMensajes() {
      if (!user || !parejaId) {
        console.log("No se pueden cargar mensajes: usuario o parejaId no definidos."); // Debug
        return;
      }
      const q = query(collection(db, "mensajes"), 
                where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]), 
                orderBy("timestamp", "asc"));
      
      onSnapshot(q, (snap) => {
        console.log("Nuevos mensajes recibidos en onSnapshot. Cantidad:", snap.docs.length); // Debug
        container.innerHTML = '';
        let lastDate = null;

        snap.forEach(d => {
          const m = d.data();
          
          let timeString = "";
          if (m.timestamp) {
            const dateObj = m.timestamp.toDate();
            const dateString = dateObj.toLocaleDateString([], { day: 'numeric', month: 'long' });
            timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (dateString !== lastDate) {
              const dateDiv = document.createElement('div');
              dateDiv.className = 'date-separator';
              dateDiv.textContent = dateString;
              container.appendChild(dateDiv);
              lastDate = dateString;
            }
          }

          if (m.receiverId === user.uid && m.leido === false) {
             updateDoc(doc(db, "mensajes", d.id), { leido: true });
             console.log("Mensaje marcado como leído:", d.id); // Debug
          }

          const isMe = m.senderId === user.uid;
          const div = document.createElement('div');
          div.className = `message-row ${isMe ? 'me' : 'them'}`;
          div.innerHTML = `
            <img src="${m.senderPhoto || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="mini-avatar">
            <div class="message-content">
              <div class="bubble">${m.text}</div>
              <span class="msg-time">${timeString}</span>
            </div>
          `;
          container.appendChild(div);
        });
        container.scrollTo(0, container.scrollHeight);
      });
    }

    async function enviarMensaje() {
      const text = msgInput.value.trim();
      if (!text || !parejaId) {
        console.log("No se puede enviar mensaje: texto vacío o parejaId no definido."); // Debug
        return;
      }
      msgInput.value = '';
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId,
        text: text,
        senderId: user.uid,
        receiverId: parejaId, 
        leido: false,         
        senderPhoto: user.photoURL,
        senderName: user.displayName || "Tu amor",
        timestamp: serverTimestamp()
      });
      console.log("Mensaje enviado a Firestore."); // Debug
    }

    msgInput.addEventListener('input', () => {
      if (!user || !parejaId) {
        console.log("No se puede gestionar typing: usuario o parejaId no definidos."); // Debug
        return;
      }
      setDoc(doc(db, "typing", user.uid), { isTyping: true, to: parejaId, name: user.displayName, photo: user.photoURL }, { merge: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { 
        setDoc(doc(db, "typing", user.uid), { isTyping: false }, { merge: true }); 
        console.log("Usuario dejó de escribir."); // Debug
      }, 2000);
      console.log("Usuario escribiendo."); // Debug
    });

    function escucharEscribiendo() {
      if (!parejaId) {
        console.log("No se puede escuchar escribiendo: parejaId no definido."); // Debug
        return;
      }
      onSnapshot(doc(db, "typing", parejaId), (snap) => {
        const data = snap.data();
        const area = document.getElementById('typing-area');
        if (data && data.isTyping && data.to === user.uid) {
          document.getElementById('typing-img').src = data.photo;
          document.getElementById('typing-name').textContent = data.name;
          area.classList.add('active');
          container.scrollTo(0, container.scrollHeight);
          console.log("Pareja está escribiendo."); // Debug
        } else {
          area.classList.remove('active');
          console.log("Pareja no está escribiendo."); // Debug
        }
      });
    }

    window.toggleMenu = () => {
      document.getElementById('chatMenu').classList.toggle('show');
      console.log("Menú de chat toggled."); // Debug
    };
    window.vaciarChat = async () => {
      if(!confirm("¿Borrar chat?")) return;
      console.log("Vaciando chat..."); // Debug
      const q = query(collection(db, "mensajes"), where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]));
      const snap = await getDocs(q);
      await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "mensajes", d.id))));
      toggleMenu();
      console.log("Chat vaciado."); // Debug
    };

    document.getElementById('sendBtn').onclick = enviarMensaje;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };
    console.log("Event listeners para enviar mensaje adjuntos."); // Debug
  </script>
</body>
</html>
