<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Nunito', sans-serif; }
    body { display: flex; flex-direction: column; height: 100dvh; }
    .chat-header { padding: 50px 20px 15px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px var(--shadow); flex-shrink: 0; position: relative; }
    .back-btn { position: absolute; left: 18px; bottom: 12px; text-decoration: none; font-size: 20px; color: var(--accent); font-weight: 900; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    .input-area { background: white; display: flex; gap: 10px; padding: 12px 15px 40px; border-top: 1px solid #eee; }
    input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--bg); outline: none; }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; }
    #typing-area { display: none; padding: 5px 15px; font-size: 12px; color: var(--dark); }
    #typing-area.active { display: block; }
  </style>
</head>
<body>
  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2 id="header-title">Nuestro Chat 💕</h2>
  </div>

  <div id="chat-container"></div>
  <div id="typing-area">Alguien está escribiendo...</div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe un mensaje...">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-messaging.js";

    let user = null, parejaId = null;
    const messaging = getMessaging();

    // 1. SOLICITAR TOKEN Y PERMISOS
    async function setupNotifications(u) {
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const token = await getToken(messaging, { 
            vapidKey: 'BCAD1wd4akkmElcAqzk2sOVuMPGV5ntxBeo7rF4q3K7Ey_4hIMhLVVvriRcRGUo46L51Tk73F49-IpISwRs0nOk' 
          });
          if (token) {
            await setDoc(doc(db, "usuarios", u.uid), { fcmToken: token }, { merge: true });
          }
        }
      } catch (err) { console.error("Error FCM:", err); }
    }

    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href = 'auth.html'; return; }
      user = u;
      setupNotifications(u);

      const userDoc = await getDoc(doc(db, "usuarios", u.uid));
      if (userDoc.exists() && userDoc.data().parejaId) {
        parejaId = userDoc.data().parejaId;
        cargarMensajes();
        escucharEscribiendo();
      }
    });

    function cargarMensajes() {
      const q = query(collection(db, "mensajes"), 
                where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]), 
                orderBy("timestamp", "asc"));
      
      onSnapshot(q, (snap) => {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        snap.forEach(d => {
          const m = d.data();
          const isMe = m.senderId === user.uid;
          const div = document.createElement('div');
          div.className = `message-row ${isMe ? 'me' : 'them'}`;
          div.innerHTML = `<img src="${m.senderPhoto || ''}" class="mini-avatar"><div class="bubble">${m.text}</div>`;
          container.appendChild(div);
        });
        container.scrollTo(0, container.scrollHeight);
      });
    }

    async function enviarMensaje() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !parejaId) return;
      input.value = '';
      
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId,
        text: text,
        senderId: user.uid,
        senderPhoto: user.photoURL,
        senderName: user.displayName || "Tu amor",
        timestamp: serverTimestamp()
      });
    }

    // Eventos de teclado
    document.getElementById('sendBtn').onclick = enviarMensaje;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };

    function escucharEscribiendo() {
      onSnapshot(doc(db, "typing", parejaId), (snap) => {
        const data = snap.data();
        const area = document.getElementById('typing-area');
        if (data && data.isTyping && data.to === user.uid) {
          area.classList.add('active');
        } else {
          area.classList.remove('active');
        }
      });
    }
  </script>
</body>
</html>
