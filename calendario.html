<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📅 Calendario Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink-bg: #ffd6e0; --pink-mid: #ffb3c6; --pink-dark: #ff85a1; --pink-accent: #ff4d79; 
      --shadow: rgba(255, 77, 121, 0.25);
    }

    [data-theme="blue"] {
      --pink-bg: #d6eaff; --pink-mid: #b3d9ff; --pink-dark: #85bfff; --pink-accent: #4d94ff; 
      --shadow: rgba(77, 148, 255, 0.25);
    }

    /* Forzar color rosa/azul en los selectores nativos del sistema */
    color-scheme: light;
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(45%) sepia(88%) border(300%) saturate(1000%) hue-rotate(320deg); /* Ajuste dinámico aproximado */
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.4s;
    }

    header { width: 100%; padding: 50px 20px 20px; display: flex; align-items: center; justify-content: space-between; }
    .back-btn { font-size: 24px; color: var(--pink-accent); text-decoration: none; font-weight: 900; }
    .current-month { font-size: 22px; font-weight: 900; color: var(--pink-accent); cursor: pointer; }

    .calendar-container {
      width: 95%; max-width: 400px; background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px); border-radius: 30px; padding: 15px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; }
    .weekdays div { font-weight: 900; color: var(--pink-dark); font-size: 14px; }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day {
      aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.7); border-radius: 15px; font-weight: 800; color: var(--pink-accent);
      position: relative; transition: 0.2s; font-size: 16px;
    }
    .day.today { background: var(--pink-accent); color: white; box-shadow: 0 5px 15px var(--shadow); }
    .day.other-month { opacity: 0.3; }

    /* ICONOS EN EL DÍA */
    /* Maleta: Esquina Superior Derecha */
    .day-icon-trip {
      position: absolute; top: 2px; right: 2px; font-size: 10px;
    }
    /* Evento (Tarta/Corazón): Centro Inferior */
    .day-event-dot {
      position: absolute; bottom: 4px; font-size: 10px;
    }

    /* MODALES */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white; padding: 25px; border-radius: 30px; width: 100%; max-width: 350px;
    }
    .modal-content h2 { color: var(--pink-accent); margin-bottom: 15px; text-align: center; }
    
    input, select {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 2px solid var(--pink-bg);
      outline: none; font-family: inherit; font-weight: 700;
    }

    .btn {
      width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900;
      margin-top: 10px; cursor: pointer; transition: 0.2s;
    }
    .btn-save { background: var(--pink-accent); color: white; }
    .btn-cancel { background: #eee; color: #777; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn">✕</a>
    <div class="current-month" id="monthDisplay" onclick="openPicker()">Mes Año</div>
    <div style="display: flex; gap: 10px;">
      <button class="back-btn" onclick="changeMonth(-1)">‹</button>
      <button class="back-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="calendar-container">
    <div class="weekdays">
      <div>lu</div><div>ma</div><div>mi</div><div>ju</div><div>vi</div><div>sá</div><div>do</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-content">
      <h2 id="modalTitle">Nuevo Evento</h2>
      <input type="text" id="eventTitle" placeholder="Nombre del evento...">
      <select id="eventType">
        <option value="❤️">Aniversario ❤️</option>
        <option value="🎂">Cumpleaños 🎂</option>
        <option value="✨">Especial ✨</option>
      </select>
      <div id="eventList" style="margin: 15px 0; max-height: 100px; overflow-y: auto;"></div>
      <button class="btn btn-save" onclick="saveEvent()">Guardar</button>
      <button class="btn btn-cancel" onclick="closeModals()">Cerrar</button>
    </div>
  </div>

  <script src="global.js"></script>
  <script type="module">
    import { db, auth } from './firebase.js';
    import { collection, query, where, onSnapshot, addDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    let user, parejaId;
    let date = new Date();
    let eventos = [];
    let viajes = []; // Nueva lista para guardar los viajes
    let selectedDayStr = "";

    onAuthStateChanged(auth, async (u) => {
      if (!u) window.location.href = "auth.html";
      user = u;
      const uDoc = await getDoc(doc(db, "usuarios", user.uid));
      parejaId = uDoc.data()?.parejaId;
      
      escucharDatos();
    });

    function escucharDatos() {
      const ids = [user.uid]; if(parejaId) ids.push(parejaId);

      // Escuchar Eventos
      onSnapshot(query(collection(db, "eventos_calendario"), where("creador", "in", ids)), (snap) => {
        eventos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderCalendar();
      });

      // Escuchar Viajes para poner las maletas
      onSnapshot(query(collection(db, "viajes"), where("creadorPor", "in", ids)), (snap) => {
        viajes = snap.docs.map(d => d.data());
        renderCalendar();
      });
    }

    function renderCalendar() {
      const grid = document.getElementById('daysGrid');
      const monthDisp = document.getElementById('monthDisplay');
      grid.innerHTML = '';

      const year = date.getFullYear();
      const month = date.getMonth();
      monthDisp.textContent = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(date);

      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      const startOffset = firstDay === 0 ? 6 : firstDay - 1;

      // Días mes anterior
      for(let i = 0; i < startOffset; i++) {
        const d = document.createElement('div');
        d.className = 'day other-month';
        grid.appendChild(d);
      }

      // Días mes actual
      for(let i = 1; i <= lastDay; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.textContent = i;

        const diaCompleto = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const actualTS = new Date(year, month, i).getTime();

        // Verificar si es Hoy
        if(i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
          dayDiv.classList.add('today');
        }

        // --- LÓGICA DE LA MALETA (VIAJES) ---
        const hayViaje = viajes.some(v => {
          const inicio = new Date(v.fechaInicio).getTime();
          const fin = new Date(v.fechaFin).getTime();
          // Sumamos margen para que incluya el día completo
          return actualTS >= inicio && actualTS <= fin;
        });

        if (hayViaje) {
          const tripIcon = document.createElement('span');
          tripIcon.className = 'day-icon-trip';
          tripIcon.textContent = '🧳';
          dayDiv.appendChild(tripIcon);
        }

        // --- LÓGICA DE EVENTOS (CUMPLES/ANIV) ---
        const evs = eventos.filter(e => e.fecha === diaCompleto);
        if(evs.length > 0) {
          const dot = document.createElement('span');
          dot.className = 'day-event-dot';
          dot.textContent = evs[0].tipo; // Muestra el primero (🎂 o ❤️)
          dayDiv.appendChild(dot);
        }

        dayDiv.onclick = () => openEventModal(diaCompleto);
        grid.appendChild(dayDiv);
      }
    }

    window.openEventModal = (fechaStr) => {
      selectedDayStr = fechaStr;
      document.getElementById('modalTitle').textContent = "Día " + fechaStr.split('-')[2];
      const list = document.getElementById('eventList');
      list.innerHTML = '';
      
      eventos.filter(e => e.fecha === fechaStr).forEach(e => {
        const item = document.createElement('div');
        item.style = "display:flex; justify-content:space-between; padding:5px; font-weight:700;";
        item.innerHTML = `<span>${e.tipo} ${e.titulo}</span> <span onclick="deleteEvent('${e.id}')" style="color:red">✕</span>`;
        list.appendChild(item);
      });

      document.getElementById('eventModal').classList.add('show');
    };

    window.saveEvent = async () => {
      const titulo = document.getElementById('eventTitle').value.trim();
      const tipo = document.getElementById('eventType').value;
      if(!titulo) return;
      await addDoc(collection(db, "eventos_calendario"), {
        fecha: selectedDayStr, titulo, tipo, creador: user.uid
      });
      document.getElementById('eventTitle').value = '';
      closeModals();
    };

    window.deleteEvent = async (id) => {
      if(confirm("¿Borrar evento?")) await deleteDoc(doc(db, "eventos_calendario", id));
      closeModals();
    };

    window.closeModals = () => document.getElementById('eventModal').classList.remove('show');
    window.changeMonth = (delta) => { date.setMonth(date.getMonth() + delta); renderCalendar(); };
    window.openPicker = () => { /* Implementar selector si se desea */ };

  </script>
</body>
</html>
