<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>👤 Mi Perfil - Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink-bg: #ffd6e0;
      --pink-mid: #ffb3c6;
      --pink-dark: #ff85a1;
      --pink-accent: #ff4d79;
      --white: #fff;
      --shadow: rgba(255, 77, 121, 0.25);
      [data-theme="blue"] {
  --pink-bg: #d6eaff;
  --pink-mid: #b3d9ff;
  --pink-dark: #85bfff;
  --pink-accent: #4d94ff;
  --shadow: rgba(77, 148, 255, 0.25);
}
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* Card de Perfil */
    .profile-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 400px;
      border-radius: 30px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px var(--shadow);
      text-align: center;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 4px solid var(--white);
      box-shadow: 0 4px 10px var(--shadow);
      margin-bottom: 15px;
      object-fit: cover;
    }

    h2 { color: var(--pink-accent); font-weight: 900; margin-bottom: 5px; }
    .email { color: var(--pink-dark); font-size: 14px; margin-bottom: 20px; font-weight: 700; }

    /* Sección de ID */
    .id-box {
      background: var(--white);
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 25px;
      border: 2px solid #ffeef2;
    }
    .id-label { font-size: 11px; font-weight: 900; color: var(--pink-mid); text-transform: uppercase; letter-spacing: 1px; }
    .id-value { 
      font-family: monospace; font-size: 13px; color: var(--pink-accent); 
      word-break: break-all; margin: 8px 0; display: block;
      background: #fff5f7; padding: 8px; border-radius: 8px;
    }
    .btn-copy {
      background: var(--pink-bg); border: none; padding: 8px 15px;
      border-radius: 12px; color: var(--pink-accent); font-size: 12px;
      font-weight: 900; cursor: pointer; transition: transform 0.2s;
    }
    .btn-copy:active { transform: scale(0.95); }

    /* Buscador de Pareja */
    .partner-section {
      border-top: 2px dashed var(--pink-mid);
      padding-top: 25px;
      margin-top: 10px;
    }
    h3 { color: var(--pink-dark); font-size: 18px; font-weight: 900; margin-bottom: 10px; }
    
    .input-group {
      display: flex; flex-direction: column; gap: 12px; margin-top: 15px;
    }
    input {
      padding: 14px; border-radius: 15px; border: 2px solid var(--pink-mid);
      font-family: 'Nunito', sans-serif; outline: none; text-align: center;
      font-size: 14px; color: var(--pink-accent); font-weight: 700;
    }
    input::placeholder { color: var(--pink-mid); }

    .btn-link {
      background: linear-gradient(135deg, var(--pink-accent), var(--pink-dark));
      color: white; border: none; padding: 14px; border-radius: 15px;
      font-weight: 900; cursor: pointer; font-size: 16px;
      box-shadow: 0 4px 12px var(--shadow); transition: transform 0.2s;
    }
    .btn-link:active { transform: scale(0.97); }

    .back-link {
      margin-top: 30px; text-decoration: none; color: var(--pink-dark);
      font-weight: 900; font-size: 15px; display: flex; align-items: center; gap: 5px;
    }

    .status-msg { margin-top: 15px; font-size: 14px; font-weight: 800; padding: 10px; border-radius: 12px; }
    .success { background: #e8f8f0; color: #2ecc71; border: 1px solid #2ecc71; }
  </style>
</head>
<body>

  <div class="profile-card">
    <div id="loadingOverlay" style="position:absolute; inset:0; background:white; border-radius:30px; display:flex; align-items:center; justify-content:center; z-index:10;">
       <span style="color: var(--pink-accent); font-weight: 900;">Cargando perfil...</span>
    </div>

    <img id="userImg" class="avatar" src="" alt="Foto" style="display:none;">
    <h2 id="userName">---</h2>
    <p class="email" id="userEmail">---</p>

    <div class="id-box">
      <span class="id-label">Tu ID secreto:</span>
      <span class="id-value" id="myId">Generando...</span>
      <button class="btn-copy" onclick="copyId()">Copiar ID 📋</button>
    </div>

    <div class="partner-section">
      <h3>Conectar Pareja 💖</h3>
      <div id="partnerStatus"></div>
      
      <div class="input-group" id="linkControls">
        <input type="text" id="partnerInput" placeholder="Pega aquí el ID de tu pareja">
        <button class="btn-link" onclick="linkPartner()">Vincular Cuentas ✨</button>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-link">‹ Volver al menú</a>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }
      currentUser = user;
      
      // Rellenar Interfaz
      document.getElementById('userName').textContent = user.displayName || "Usuario";
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userImg').src = user.photoURL || "https://via.placeholder.com/80";
      document.getElementById('userImg').style.display = "inline-block";
      document.getElementById('myId').textContent = user.uid;

      // Ocultar el aviso de cargando
      document.getElementById('loadingOverlay').style.display = "none";

      // Lógica de base de datos
      try {
        const userRef = doc(db, "usuarios", user.uid);
        const userDoc = await getDoc(userRef);

        if (!userDoc.exists()) {
          // Si no existe en Firestore, lo creamos
          await setDoc(userRef, {
            nombre: user.displayName,
            email: user.email,
            foto: user.photoURL,
            uid: user.uid,
            parejaId: null
          });
        } else if (userDoc.data().parejaId) {
          // Si ya tiene pareja, mostramos quién es
          checkPartnerStatus(userDoc.data().parejaId);
        }
      } catch (error) {
        console.error("Error al cargar datos:", error);
      }
    });

    async function checkPartnerStatus(partnerId) {
      const partnerDoc = await getDoc(doc(db, "usuarios", partnerId));
      if (partnerDoc.exists()) {
        document.getElementById('partnerStatus').className = "status-msg success";
        document.getElementById('partnerStatus').textContent = `✨ Vinculado con ${partnerDoc.data().nombre}`;
        document.getElementById('linkControls').style.display = 'none';
      }
    }

    window.linkPartner = async () => {
      const pId = document.getElementById('partnerInput').value.trim();
      if (!pId || pId === currentUser.uid) {
        alert("Introduce un ID válido que no sea el tuyo");
        return;
      }

      try {
        const partnerRef = doc(db, "usuarios", pId);
        const partnerSnap = await getDoc(partnerRef);

        if (!partnerSnap.exists()) {
          alert("No se encontró ningún usuario con ese ID. Asegúrate de que tu pareja ya haya entrado a su perfil.");
          return;
        }

        // Actualizamos los dos documentos para que estén unidos
        await updateDoc(doc(db, "usuarios", currentUser.uid), { parejaId: pId });
        await updateDoc(partnerRef, { parejaId: currentUser.uid });

        alert("¡Cuentas vinculadas con éxito! 💕");
        location.reload();
      } catch (e) {
        alert("Error al vincular: " + e.message);
      }
    };

    window.copyId = () => {
      const idText = document.getElementById('myId').textContent;
      navigator.clipboard.writeText(idText).then(() => {
        alert("¡ID copiado al portapapeles! 📋");
      });
    };
  </script>
</body>
<script src="global.js"></script>
</html>
