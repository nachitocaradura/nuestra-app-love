<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💕 Nuestra App</title>
  
  <link rel="manifest" href="manifest.json?v=4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icono-app-192.png?v=4">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.2);
      --sidebar-bg: #fff; --text-main: #444;
    }

    [data-theme="blue"] {
      --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      height: 100dvh;
      transition: background 0.4s ease;
      overflow: hidden; /* DESHABILITA EL SCROLL GLOBAL */
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* NUEVO: Contenedor para que solo la cuadrícula de apps tenga scroll */
    .apps-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 30px;
      -webkit-overflow-scrolling: touch;
    }

    /* NUEVO: Estilo para el badge de notificaciones */
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff4d4d;
      color: white;
      font-size: 12px;
      font-weight: 900;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: none; /* Se muestra vía JS */
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      z-index: 10;
    }

    /* --- RELOJ --- */
    .clock-container {
      width: 100%;
      text-align: center;
      padding-top: 50px;
      flex-shrink: 0;
    }
    #clock {
      font-size: 50px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 4px 10px var(--shadow);
    }

    /* --- ANIMACIÓN DE EMOTES --- */
    .heart-float {
      position: absolute; bottom: -50px; pointer-events: none; z-index: 1; opacity: 0; animation: floatUp 6s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* --- GRID DE APPS --- */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 30px;
      max-width: 500px;
      margin: 0 auto;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .app-item:active { transform: scale(0.9); }

    .app-icon {
      width: 65px;
      height: 65px;
      background: white;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 8px 20px var(--shadow);
      margin-bottom: 8px;
      position: relative; /* Para el badge */
    }

    .app-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
    }

    /* --- SIDEBAR --- */
    #sidebar {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: var(--sidebar-bg); z-index: 1000; transition: left 0.3s ease;
      box-shadow: 5px 0 25px rgba(0,0,0,0.1); padding: 60px 25px;
    }
    #sidebar.open { left: 0; }

    .sidebar-header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
    .sidebar-header img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--bg); object-fit: cover; }
    .sidebar-header h2 { font-weight: 900; color: var(--accent); font-size: 20px; }

    .menu-btn-trigger {
      position: absolute; top: 50px; left: 20px; font-size: 26px; color: var(--accent); cursor: pointer; z-index: 10;
    }

    /* --- ACORDEONES --- */
    .accordion-item { margin-bottom: 15px; border-radius: 15px; overflow: hidden; background: #f9f9f9; }
    .accordion-header { padding: 15px; font-weight: 900; color: var(--text-main); display: flex; justify-content: space-between; cursor: pointer; }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; padding: 0 15px; }
    .accordion-item.open .accordion-content { max-height: 200px; padding-bottom: 15px; }

    /* --- TEMAS --- */
    .theme-selector { display: flex; gap: 10px; margin-top: 10px; }
    .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
    .dot.pink { background: #ffb3c6; }
    .dot.blue { background: #b3d9ff; }
    .dot.active { border-color: var(--accent); }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
      display: none; z-index: 999;
    }
    #overlay.show { display: block; }

    /* BOTÓN LOGOUT */
    .logout-btn {
      margin-top: 30px; padding: 12px; width: 100%; border-radius: 12px;
      border: none; background: #ffeded; color: #ff4d4d; font-weight: 900; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="overlay" onclick="toggleSidebar()"></div>
  <div class="menu-btn-trigger" onclick="toggleSidebar()">☰</div>

  <div id="sidebar">
    <div class="sidebar-header">
      <img id="userPhoto" src="https://via.placeholder.com/60" alt="Tú">
      <h2 id="welcomeText">¡Hola! 💕</h2>
    </div>

    <div class="accordion-item" id="acc-themes">
      <div class="accordion-header" onclick="toggleAccordion('acc-themes')">Personalizar 🎨</div>
      <div class="accordion-content">
        <p style="font-size: 14px; margin-bottom: 10px; color: #666;">Elige tu color favorito:</p>
        <div class="theme-selector">
          <div id="dot-pink" class="dot pink active" onclick="setTheme('pink')"></div>
          <div id="dot-blue" class="dot blue" onclick="setTheme('blue')"></div>
        </div>
      </div>
    </div>

    <div class="accordion-item" id="acc-perfil">
      <div class="accordion-header" onclick="window.location.href='perfil.html'">Mi Perfil 👤</div>
    </div>

    <button class="logout-btn" onclick="auth.signOut()">Cerrar Sesión</button>
  </div>

  <div class="clock-container">
    <div id="clock">00:00</div>
  </div>

  <div class="apps-scroll-area">
    <div class="app-grid">
      <a href="chat.html" class="app-item">
        <div class="app-icon">
          💬
          <div id="chat-badge" class="notification-badge">0</div>
        </div>
        <span class="app-label">Chat</span>
      </a>
      <a href="calendario.html" class="app-item">
        <div class="app-icon">📅</div>
        <span class="app-label">Calendario</span>
      </a>
      <a href="ruleta.html" class="app-item">
        <div class="app-icon">🎡</div>
        <span class="app-label">Ruleta</span>
      </a>
      <a href="viajes.html" class="app-item">
        <div class="app-icon">🧳</div>
        <span class="app-label">Viajes</span>
      </a>
      <div class="app-item" onclick="alert('Próximamente...')">
        <div class="app-icon">📸</div>
        <span class="app-label">Álbum</span>
      </a>
      <div class="app-item" onclick="alert('Próximamente...')">
        <div class="app-icon">🎵</div>
        <span class="app-label">Música</span>
      </a>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ":" + m;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function createHeart() {
      const hearts = ['❤️', '💖', '✨', '🌸', '💕'];
      const h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (Math.random() * 20 + 15) + "px";
      h.style.animationDuration = (Math.random() * 3 + 4) + "s";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 6000);
    }
    setInterval(createHeart, 800);

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
    function toggleAccordion(id) {
      document.getElementById(id).classList.toggle('open');
    }

    // Temas
    function setTheme(theme) {
      if(theme === 'blue') {
        document.documentElement.setAttribute('data-theme', 'blue');
        localStorage.setItem('theme', 'blue');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'pink');
      }
      updateDots();
    }
    function updateDots() {
      const t = localStorage.getItem('theme');
      const dotPink = document.getElementById('dot-pink');
      const dotBlue = document.getElementById('dot-blue');
      if(dotPink && dotBlue) {
        dotPink.classList.toggle('active', t !== 'blue');
        dotBlue.classList.toggle('active', t === 'blue');
      }
    }

    if(localStorage.getItem('theme') === 'blue') setTheme('blue');
    updateDots();
  </script>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "auth.html";
      } else {
        const nombre = user.displayName ? user.displayName.split(' ')[0] : "Amor";
        document.getElementById('welcomeText').textContent = "¡Hola, " + nombre + "! 💕";
        if(user.photoURL) {
          const img = document.getElementById('userPhoto');
          img.src = user.photoURL;
        }

        // LÓGICA DE NOTIFICACIONES (Badge del Chat)
        const userRef = doc(db, "usuarios", user.uid);
        const userSnap = await getDoc(userRef);
        const userData = userSnap.data();
        
        if(userData && userData.parejaId) {
          const pId = userData.parejaId;
          const badge = document.getElementById('chat-badge');
          
          // Escuchar mensajes no leídos (mensajes de la pareja hacia mí)
          const q = query(
            collection(db, "mensajes"), 
            where("senderId", "==", pId),
            where("receiverId", "==", user.uid),
            where("leido", "==", false)
          );

          onSnapshot(q, (snap) => {
            const count = snap.size;
            if(count > 0) {
              badge.textContent = count;
              badge.style.display = 'flex';
            } else {
              badge.style.display = 'none';
            }
          });
        }
      }
    });
  </script>

</body>
</html>
