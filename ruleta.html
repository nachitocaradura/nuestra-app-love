<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta - Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    h1 { color: var(--accent); margin-bottom: 30px; }
    .wheel-container { position: relative; width: 300px; height: 300px; border: 8px solid white; border-radius: 50%; box-shadow: 0 10px 25px var(--shadow); background: white; display: flex; align-items: center; justify-content: center; font-size: 50px; }
    .btn-spin { margin-top: 40px; background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px var(--shadow); }
    .btn-back { margin-top: 20px; color: var(--accent); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🎡 Ruleta Mágica</h1>
  <div class="wheel-container" id="wheel">❓</div>
  <button class="btn-spin" onclick="spin()">¡GIRAR!</button>
  <a href="index.html" class="btn-back">Volver</a>

  <script>
    if(localStorage.getItem('theme') === 'blue') document.documentElement.setAttribute('data-theme', 'blue');

    const opciones = ["Cena fuera 🍕", "Masaje 💆‍♂️", "Cine 🍿", "Vales por un beso 💋", "Elegir peli 🎬"];
    function spin() {
      const wheel = document.getElementById('wheel');
      wheel.style.transform = "rotate(720deg)";
      wheel.style.transition = "2s ease-out";
      setTimeout(() => {
        const res = opciones[Math.floor(Math.random() * opciones.length)];
        wheel.textContent = res;
        wheel.style.transform = "rotate(0deg)";
        wheel.style.transition = "none";
      }, 2000);
    }
  </script>
</body>
</html>
