<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💕 Nuestra App</title>
  
  <link rel="manifest" href="manifest.json?v=4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icono-app-192.png?v=4">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.2);
      --sidebar-bg: #fff; --text-main: #444;
    }

    [data-theme="blue"] {
      --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      transition: background 0.4s ease;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* --- RELOJ --- */
    .clock-container {
      width: 100%;
      text-align: center;
      padding-top: 50px;
    }
    #clock {
      font-size: 50px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 4px 10px var(--shadow);
    }

    /* --- ANIMACIÓN DE EMOTES --- */
    .heart-float {
      position: absolute; bottom: -50px; pointer-events: none; z-index: 1; opacity: 0;
      animation: floatUp 6s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* --- SIDEBAR --- */
    .sidebar {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: var(--sidebar-bg); z-index: 1000; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 5px 0 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;
    }
    .sidebar.open { left: 0; }
    .sidebar-header { padding: 60px 25px 20px; background: var(--bg); transition: background 0.4s; position: relative; }
    .sidebar-header h3 { color: var(--accent); font-weight: 900; font-size: 24px; }
    .sidebar-menu { padding: 20px 10px; flex: 1; overflow-y: auto; }
    
    .sidebar-item {
      display: flex; align-items: center; padding: 15px 20px; margin-bottom: 5px;
      border-radius: 15px; color: var(--text-main); font-weight: 700; text-decoration: none; transition: 0.2s;
      cursor: pointer;
    }
    .sidebar-item:active { background: var(--bg); transform: scale(0.98); }

    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; padding-left: 55px; }
    .accordion-content.open { max-height: 150px; }
    .theme-dot { width: 30px; height: 30px; border-radius: 50%; margin-right: 15px; border: 3px solid transparent; cursor: pointer; }
    .theme-dot.pink { background: #ff4d79; }
    .theme-dot.blue { background: #4d94ff; }
    .theme-dot.active { border-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.2); }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);
      z-index: 999; display: none;
    }
    .overlay.show { display: block; }

    /* --- CONTENIDO PRINCIPAL --- */
    .container { position: relative; z-index: 10; padding: 20px 25px 60px; display: flex; flex-direction: column; align-items: center; }
    
    .menu-btn { position: absolute; left: 25px; top: 55px; font-size: 28px; color: var(--accent); cursor: pointer; z-index: 11; }

    .welcome-card { text-align: center; margin-bottom: 30px; }
    .user-avatar { 
      width: 100px; height: 100px; border-radius: 35px; border: 5px solid white; 
      box-shadow: 0 8px 20px var(--shadow); margin-bottom: 15px; object-fit: cover; 
      cursor: pointer; transition: transform 0.2s;
    }
    .user-avatar:active { transform: scale(0.9); }

    .welcome-card h1 { color: var(--accent); font-weight: 900; font-size: 28px; margin-bottom: 5px; }
    .welcome-card p { color: var(--text-main); font-weight: 700; opacity: 0.8; }

    .main-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 400px;
    }
    .menu-item {
      background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border-radius: 30px;
      padding: 25px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px var(--shadow); transition: 0.3s; cursor: pointer; border: 2px solid transparent;
      position: relative;
    }
    .menu-item:active { transform: scale(0.92); background: white; border-color: var(--accent); }
    .menu-icon { font-size: 40px; margin-bottom: 12px; }
    .menu-text { font-weight: 900; color: var(--accent); font-size: 16px; }

    /* --- ESTILO DEL BADGE (Círculo de mensajes) --- */
    .badge-notif {
      position: absolute;
      top: 10px;
      right: 15px;
      background: #ff4d4d;
      color: white;
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex; /* Cambiado de 'none' a 'flex' para que lo veas siempre */
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3 id="sidebarTitle">Menú</h3>
    </div>
    <div class="sidebar-menu">
      <a href="perfil.html" class="sidebar-item">👤 Mi Perfil</a>
      <div class="sidebar-item" onclick="toggleAccordion('themesAcc')">🎨 Cambiar Tema</div>
      <div id="themesAcc" class="accordion-content">
        <div style="display: flex; padding: 15px 0;">
          <div class="theme-dot pink" id="dot-pink" onclick="setTheme('pink')"></div>
          <div class="theme-dot blue" id="dot-blue" onclick="setTheme('blue')"></div>
        </div>
      </div>
      <a href="auth.html" class="sidebar-item" style="color: #ff4444; margin-top: 20px;">🚪 Cerrar Sesión</a>
    </div>
  </div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="clock-container">
    <div id="clock">00:00</div>
  </div>

  <div class="container">
    <div class="welcome-card">
      <img src="" id="userPhoto" class="user-avatar" style="display:none;" onclick="location.href='perfil.html'">
      <h1 id="welcomeText">¡Hola! 💕</h1>
      <p>¿Qué vamos a hacer hoy?</p>
    </div>

    <div class="main-grid">
      <div class="menu-item" onclick="location.href='chat.html'">
        <div class="menu-icon">💬</div>
        <div class="menu-text">Chat</div>
        <div id="chatBadge" class="badge-notif">0</div>
      </div>
      
      <div class="menu-item" onclick="location.href='calendario.html'">
        <div class="menu-icon">📅</div>
        <div class="menu-text">Calendario</div>
      </div>

      <div class="menu-item" onclick="location.href='ruleta.html'">
        <div class="menu-icon">🎡</div>
        <div class="menu-text">Ruleta</div>
      </div>

      <div class="menu-item" onclick="location.href='viajes.html'">
        <div class="menu-icon">🧳</div>
        <div class="menu-text">Viajes</div>
      </div>

      <div class="menu-item" onclick="location.href='perfil.html'">
        <div class="menu-icon">👤</div>
        <div class="menu-text">Perfil</div>
      </div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart-float';
      heart.innerHTML = ['❤️','💖','💕','💗','✨'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 800);

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
    function toggleAccordion(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function setTheme(theme) {
      if(theme === 'blue') {
        document.documentElement.setAttribute('data-theme', 'blue');
        localStorage.setItem('theme', 'blue');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'pink');
      }
      updateDots();
    }
    function updateDots() {
      const t = localStorage.getItem('theme');
      const dotPink = document.getElementById('dot-pink');
      const dotBlue = document.getElementById('dot-blue');
      if(dotPink && dotBlue) {
        dotPink.classList.toggle('active', t !== 'blue');
        dotBlue.classList.toggle('active', t === 'blue');
      }
    }
    if(localStorage.getItem('theme') === 'blue') setTheme('blue');
    updateDots();
  </script>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "auth.html";
      } else {
        const nombre = user.displayName ? user.displayName.split(' ')[0] : "Amor";
        document.getElementById('welcomeText').textContent = "¡Hola, " + nombre + "! 💕";
        
        if(user.photoURL) {
          const img = document.getElementById('userPhoto');
          img.src = user.photoURL;
          img.style.display = 'inline-block';
        }

        // Lógica para actualizar el número si llega un mensaje
        try {
          const uRef = doc(db, "usuarios", user.uid);
          const uSnap = await getDoc(uRef);
          if (uSnap.exists()) {
            const pId = uSnap.data().parejaId;
            if (pId) {
              const q = query(collection(db, "mensajes"), 
                where("senderId", "==", pId), 
                where("receiverId", "==", user.uid), 
                where("leido", "==", false)
              );
              onSnapshot(q, (snap) => {
                const badge = document.getElementById('chatBadge');
                // Si hay mensajes, ponemos el número real, si no, dejamos el 0
                badge.textContent = snap.size > 0 ? snap.size : "0";
              });
            }
          }
        } catch(e) { console.log("Error de conexión"); }
      }
    });
  </script>

</body>
</html>
