<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; height: 100dvh; }
    .chat-header { padding: 50px 20px 15px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px var(--shadow); position: relative; }
    .back-btn { position: absolute; left: 18px; bottom: 12px; text-decoration: none; font-size: 20px; color: var(--accent); font-weight: 900; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; }
    .input-area { background: white; display: flex; gap: 10px; padding: 12px 15px 60px; border-top: 1px solid #eee; }
    input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--bg); outline: none; }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; }
  </style>
</head>
<body>
  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2>Nuestro Chat 💕</h2>
  </div>
  <div id="chat-container"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    let user = null, parejaId = null;
    const container = document.getElementById('chat-container');
    const msgInput = document.getElementById('msgInput');

    // REGISTRAR Y ACTIVAR SW
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update(); // Forzar actualización
      });
    }

    // PEDIR PERMISO EXPLÍCITO
    document.body.onclick = () => {
      if (Notification.permission === 'default') Notification.requestPermission();
    };

    onAuthStateChanged(auth, async (u) => {
      if (!u) return;
      user = u;
      const userDoc = await (await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js")).getDoc((await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js")).doc(db, "usuarios", u.uid));
      if (userDoc.exists()) {
        parejaId = userDoc.data().parejaId;
        
        // ENVIAR DATOS AL SW
        navigator.serviceWorker.ready.then(reg => {
          reg.active.postMessage({ type: 'SET_CHAT_DATA', userId: user.uid, parejaId: parejaId });
        });

        cargarMensajes();
      }
    });

    function cargarMensajes() {
      const q = query(collection(db, "mensajes"), where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]), orderBy("timestamp", "asc"));
      onSnapshot(q, (snap) => {
        container.innerHTML = '';
        snap.forEach(d => {
          const m = d.data();
          const div = document.createElement('div');
          div.className = `message-row ${m.senderId === user.uid ? 'me' : 'them'}`;
          div.innerHTML = `<img src="${m.senderPhoto || ''}" class="mini-avatar"><div class="bubble">${m.text}</div>`;
          container.appendChild(div);
        });
        container.scrollTo(0, container.scrollHeight);
      });
    }

    document.getElementById('sendBtn').onclick = async () => {
      const val = msgInput.value.trim();
      if (!val) return;
      msgInput.value = '';
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId, text: val, senderId: user.uid,
        senderPhoto: user.photoURL, timestamp: serverTimestamp()
      });
    };
  </script>
</body>
</html>
