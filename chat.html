<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>💬 Nuestro Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --mid: #ffb3c6; --dark: #ff85a1; --accent: #ff4d79; --shadow: rgba(255, 77, 121, 0.25); }
    [data-theme="blue"] { --bg: #d6eaff; --mid: #b3d9ff; --dark: #85bfff; --accent: #4d94ff; --shadow: rgba(77, 148, 255, 0.25); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; height: 100dvh; transition: background 0.4s ease; }
    .chat-header { padding: 50px 20px 15px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px var(--shadow); position: relative; flex-shrink: 0; }
    .back-btn { position: absolute; left: 18px; bottom: 12px; text-decoration: none; font-size: 20px; color: var(--accent); font-weight: 900; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .them .bubble { background: white; color: #444; border-bottom-left-radius: 4px; }
    .input-area { background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; padding: 12px 15px 60px; }
    input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--bg); outline: none; font-size: 16px; }
    .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat-header">
    <a href="index.html" class="back-btn">‹</a>
    <h2>Nuestro Chat 💕</h2>
  </div>

  <div id="chat-container"></div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe aquí..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-messaging.js";

    let user = null, parejaId = null;
    let primeraCarga = true; 
    const container = document.getElementById('chat-container');
    const msgInput = document.getElementById('msgInput');
    const messaging = getMessaging();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Función para pedir permiso y lanzar notificación visual/sonora
    async function notificar(titulo, texto) {
      if (Notification.permission === 'granted') {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification(titulo, {
          body: texto,
          icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
          vibrate: [200, 100, 200],
          tag: 'new-msg'
        });
      }
    }

    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href = 'auth.html'; return; }
      user = u;
      
      // Pedir permisos al entrar
      Notification.requestPermission();

      const userDoc = await getDoc(doc(db, "usuarios", u.uid));
      if (userDoc.exists() && userDoc.data().parejaId) {
        parejaId = userDoc.data().parejaId;
        cargarMensajes();
      }
    });

    function cargarMensajes() {
      const q = query(collection(db, "mensajes"), 
                where("chatId", "in", [user.uid + parejaId, parejaId + user.uid]), 
                orderBy("timestamp", "asc"));
      
      onSnapshot(q, (snap) => {
        // Detectar si hay mensajes nuevos
        const cambios = snap.docChanges();
        
        snap.forEach((d, index) => {
          // Si es la carga inicial, solo dibujamos. Si es un cambio posterior (mensaje nuevo)
          if (!primeraCarga) {
            cambios.forEach(change => {
              if (change.type === "added") {
                const m = change.doc.data();
                // Si el mensaje lo envió ella, ¡NOTIFICAR SIEMPRE!
                if (m.senderId === parejaId) {
                  notificar("Ella dice: 💕", m.text);
                }
              }
            });
          }
        });

        // Dibujar mensajes en pantalla
        container.innerHTML = '';
        snap.forEach(d => {
          const m = d.data();
          const div = document.createElement('div');
          div.className = `message-row ${m.senderId === user.uid ? 'me' : 'them'}`;
          div.innerHTML = `<div class="bubble">${m.text}</div>`;
          container.appendChild(div);
        });
        
        container.scrollTo(0, container.scrollHeight);
        primeraCarga = false; // Ya pasó la carga de mensajes viejos
      });
    }

    async function enviarMensaje() {
      const text = msgInput.value.trim();
      if (!text || !parejaId) return;
      msgInput.value = '';
      await addDoc(collection(db, "mensajes"), {
        chatId: user.uid + parejaId,
        text: text,
        senderId: user.uid,
        timestamp: serverTimestamp()
      });
    }

    document.getElementById('sendBtn').onclick = enviarMensaje;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };
  </script>
</body>
</html>
