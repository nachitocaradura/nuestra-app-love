<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>👤 Mi Perfil - Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink-bg: #ffd6e0;
      --pink-mid: #ffb3c6;
      --pink-dark: #ff85a1;
      --pink-accent: #ff4d79;
      --white: #fff;
      --shadow: rgba(255, 77, 121, 0.25);
    }
    [data-theme="blue"] {
      --pink-bg: #d6eaff;
      --pink-mid: #b3d9ff;
      --pink-dark: #85bfff;
      --pink-accent: #4d94ff;
      --shadow: rgba(77, 148, 255, 0.25);
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.4s ease;
    }

    .back-btn {
      position: absolute;
      left: 18px;
      top: 55px;
      text-decoration: none;
      font-size: 20px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 6px 10px;
      color: var(--pink-accent);
      font-weight: 900;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    header {
      width: 100%;
      padding: 60px 20px 20px;
      text-align: center;
    }

    header h1 {
      color: var(--pink-accent);
      font-weight: 900;
      font-size: 28px;
    }

    .profile-container {
      width: 90%;
      max-width: 450px;
      background: var(--white);
      border-radius: 35px;
      padding: 30px 20px;
      box-shadow: 0 15px 35px var(--shadow);
      margin-bottom: 30px;
      text-align: center;
    }

    .user-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--pink-bg);
      margin-bottom: 15px;
      object-fit: cover;
    }

    .info-card {
      background: #fdf2f5;
      padding: 15px;
      border-radius: 20px;
      margin-top: 15px;
      text-align: left;
    }
    [data-theme="blue"] .info-card { background: #f0f7ff; }

    .info-card h3 {
      font-size: 14px;
      color: var(--pink-dark);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-card p {
      font-weight: 700;
      color: #444;
      word-break: break-all;
    }

    .status-msg {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      padding: 8px;
      border-radius: 10px;
    }
    .status-msg.error { color: #ff4d4d; background: #fff0f0; }
    .status-msg.success { color: #2ecc71; background: #eafaf1; }

    .input-group {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 12px 15px;
      border-radius: 15px;
      border: 2px solid var(--pink-bg);
      font-family: inherit;
      outline: none;
      font-weight: 700;
      color: #444;
      width: 100%;
    }

    .btn-link {
      background: var(--pink-accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 15px var(--shadow);
      transition: 0.3s;
      width: 100%;
    }

    .logout-btn {
      margin-top: 20px;
      background: none;
      border: none;
      color: #888;
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">‹</a>

  <header>
    <h1>Mi Perfil</h1>
  </header>

  <div class="profile-container">
    <img id="userImg" src="https://via.placeholder.com/100" class="user-img">
    <h2 id="userName" style="color: var(--pink-accent); font-weight: 900;">Cargando...</h2>
    
    <div class="info-card">
      <h3>Mi ID Personal</h3>
      <p id="myId">Cargando...</p>
      <button onclick="copyId()" style="font-size: 10px; margin-top: 5px; background: none; border: none; color: var(--pink-accent); font-weight: 900;">📋 COPIAR ID</button>
    </div>

    <div class="info-card">
      <h3>Mi Fecha de Nacimiento 🎂</h3>
      <input type="date" id="birthDate">
      <button class="btn-link" onclick="guardarTodo()" style="margin-top: 10px; font-size: 12px;">Guardar Cambios</button>
    </div>

    <div class="info-card">
      <h3>Estado de Pareja</h3>
      <div id="partnerStatus" class="status-msg error">No vinculado</div>
      
      <div id="linkControls" class="input-group">
        <input type="text" id="partnerInput" placeholder="Pega el ID de tu pareja...">
        <button class="btn-link" onclick="linkPartner()">Vincular Cuentas 💕</button>
      </div>
    </div>

    <button class="logout-btn" onclick="auth.signOut()">Cerrar Sesión</button>
  </div>

  <script src="global.js"></script>
  <script type="module">
    import { db, auth } from './firebase.js';
    import { doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    let currentUser = null;

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }
      currentUser = user;
      document.getElementById('userName').textContent = user.displayName || "Usuario";
      document.getElementById('userImg').src = user.photoURL || "https://via.placeholder.com/100";
      document.getElementById('myId').textContent = user.uid;

      onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
        if (docSnap.exists()) {
          const userData = docSnap.data();
          if (userData.parejaId) checkPartner(userData.parejaId);
          if (userData.birthDate) document.getElementById('birthDate').value = userData.birthDate;
        }
      });
    });

    // Función mágica: guarda la fecha y la foto para que el otro la vea
    window.guardarTodo = async () => {
      const bDate = document.getElementById('birthDate').value;
      if (!bDate) return alert("Pon tu fecha de cumple");

      try {
        await updateDoc(doc(db, "usuarios", currentUser.uid), { 
          birthDate: bDate,
          photoURL: currentUser.photoURL,
          nombre: currentUser.displayName
        });
        alert("¡Guardado! Ahora tu pareja podrá ver tu foto en el calendario 🎂");
      } catch (e) {
        alert("Error: " + e.message);
      }
    };

    async function checkPartner(pId) {
      const partnerDoc = await getDoc(doc(db, "usuarios", pId));
      if (partnerDoc.exists()) {
        document.getElementById('partnerStatus').className = "status-msg success";
        document.getElementById('partnerStatus').textContent = `✨ Vinculado con ${partnerDoc.data().nombre}`;
        document.getElementById('linkControls').style.display = 'none';
      }
    }

    window.linkPartner = async () => {
      const pId = document.getElementById('partnerInput').value.trim();
      if (!pId || pId === currentUser.uid) return alert("ID no válido");

      const partnerRef = doc(db, "usuarios", pId);
      const partnerSnap = await getDoc(partnerRef);
      if (!partnerSnap.exists()) return alert("No existe ese usuario");

      await updateDoc(doc(db, "usuarios", currentUser.uid), { parejaId: pId });
      await updateDoc(partnerRef, { parejaId: currentUser.uid });
      location.reload();
    };

    window.copyId = () => {
      navigator.clipboard.writeText(document.getElementById('myId').textContent);
      alert("¡ID copiado! 📋");
    };
  </script>
</body>
</html>
