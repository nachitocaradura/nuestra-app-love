<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario - Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffd6e0; --accent: #ff4d79; }
    [data-theme="blue"] { --bg: #d6eaff; --accent: #4d94ff; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; }
    h2 { color: var(--accent); }
    .btn-back { margin-top: 20px; display: inline-block; color: var(--accent); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📅 Calendario</h2>
    <p>Próximamente: Vuestros eventos compartidos aquí.</p>
    <a href="index.html" class="btn-back">Volver</a>
  </div>
  <script>
    if(localStorage.getItem('theme') === 'blue') document.documentElement.setAttribute('data-theme', 'blue');
  </script>
</body>
</html>
